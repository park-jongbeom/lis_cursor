version: "3.9"

networks:
  idr-net:
    name: idr-net
    driver: bridge

volumes:
  pgdata-prod:

services:
  idr-postgres:
    image: postgres:15-bookworm
    container_name: idr-postgres
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: idr_analytics
      POSTGRES_USER: idr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idr -d idr_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - idr-net

  idr-redis:
    image: redis:7-bookworm
    container_name: idr-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - idr-net

