version: "3.9"

# 프로젝트명을 디렉터리(lis_cursor)와 분리 — podman-compose가 dev pod와 같은 pod로 묶지 않도록 함
name: idr-test

# 테스트 전용 격리 스택 — dev/prod 네트워크·볼륨과 완전 분리
# 실행: podman-compose -f docker-compose.test.yml up -d --wait
# 종료: Makefile 의 test-infra-down(컨테이너·네트워크·볼륨 명시 제거) 권장 — dev pod와 충돌 방지

networks:
  idr-test-net:
    driver: bridge

volumes:
  pgdata-test:

services:
  idr-postgres-test:
    image: postgres:15-bookworm
    container_name: idr-postgres-test
    environment:
      POSTGRES_DB: idr_test
      POSTGRES_USER: idr
      # 미설정 시 conftest.py·Makefile migrate-test와 동일 기본값
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-idr-test-pw}
    ports:
      # dev 15432, Dify prod 5433과 충돌 회피
      - "15433:5432"
    volumes:
      - pgdata-test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idr -d idr_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - idr-test-net
    # RHEL 8 rootless podman + SELinux 호환
    security_opt:
      - seccomp=unconfined
      - label=disable

  idr-redis-test:
    image: redis:7-bookworm
    container_name: idr-redis-test
    ports:
      # dev 6379와 분리
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - idr-test-net
    security_opt:
      - seccomp=unconfined
      - label=disable
