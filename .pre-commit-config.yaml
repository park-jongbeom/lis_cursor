repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2
          - pydantic-settings>=2
          - sqlalchemy[asyncio]>=2
          - fastapi>=0.115
          - types-passlib
          - types-python-jose
          # Poetry 로컬 mypy 와 동일하게: 격리 환경에 없으면 bcrypt/pandas 가 Any → no-any-return
          - bcrypt>=4
          - pandas>=2.2
          - pandas-stubs>=2.2
          - numpy>=1.26
          - httpx>=0.27
          - redis>=5
          - arq>=0.26
        args:
          - --config-file=pyproject.toml
          - --explicit-package-bases
        files: ^idr_analytics/app/.*\.py$
