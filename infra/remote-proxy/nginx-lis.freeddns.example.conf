# ga-server (Ubuntu 등) — https://lis.qk54r71z.freeddns.org/ → 개발/운영 호스트로 역프록시
#
# 이 파일은 예시입니다. 실제 경로는 보통:
#   /etc/nginx/sites-available/lis.conf
#   → sites-enabled 에 심볼릭 링크
#
# DEV_HOST: SSH로 접속한 쪽 머신의 ga-server에서 도달 가능한 주소
#   - 같은 LAN: 192.168.x.x / 10.x.x.x
#   - Tailscale: 100.x.x.x
#   - SSH -R 역터널을 ga-server에 둔 경우: 127.0.0.1 와 로컬 바인딩 포트
#
# 포트 (현재 프로젝트 기본):
#   - FastAPI (uvicorn): 8000
#   - Dify (dify-nginx 컨테이너): 8080
#
# certbot 등으로 TLS는 ga-server에서 종료하고, 백엔드는 http 로 프록시하는 구성을 가정합니다.

