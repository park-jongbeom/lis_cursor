# ── Dify만 노출하고 FastAPI는 내부(Dify HTTP Request)에서만 쓰는 경우 ───────
# 전체 server 블록을 DEV_HOST:8080 한 곳으로만 proxy_pass 하면 됩니다.
# 이 경우 브라우저에서는 https://lis.../ 만 열면 되고,
# FastAPI는 Dify 워크플로의 HTTP 노드에서 host.containers.internal 또는 DEV_HOST:8000 으로 호출.

# ── map 블록은 http { } 안, server 와 동급이 아님 ───────────────────────────
# 위 주석의 map 은 /etc/nginx/nginx.conf 의 http { } 블록 안에 한 번만 넣으세요.
