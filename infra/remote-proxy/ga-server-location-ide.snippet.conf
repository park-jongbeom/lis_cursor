# ── lis.* 공인 URL 엣지(ga-nginx 등) — /ide/ 만 추가할 때 참고 ─────────────────
#
# 경로 전체 의미(데모 / Dify /ide): docs/plans/lis_public_url_path_map.md
#
# ga-server 는 «앱을 호스팅하는 서버»가 아니라, 브라우저 요청을 **이미 로컬(또는 터널로
# 연결된 동일 목적지)에서 돌아가는 FastAPI** 로 넘기는 역프록시 역할만 한다.
#
# 따라서 여기서 할 일은 딱 하나:
#   • `/api/v1/` 에 쓰는 것과 **동일한** `proxy_pass` 대상(로컬 uvicorn·SSH -R 끝점 등)으로
#     `location /ide/` 를 추가한다.
#   • Dify 로 가는 `location /` 보다 **위**에 둔다(접두사가 더 긴 `/ide/` 가 먼저 매칭되게).
#
# 로컬 FastAPI 에는 이미 `app.mount("/ide", StaticFiles(...))` 와 `demo/ide/` 가 포함된
# 프로세스가 떠 있어야 한다(리포지토리에서 로컬 운영 배포 쪽만 갱신).
#
#     location = /ide {
#         return 301 /ide/;
#     }
#
#     location /ide/ {
#         proxy_pass http://동일업스트림/ide/;   # /api/v1/ 과 동일 호스트:포트 (§2.1)
#         # ga-nginx Docker + 호스트 터널: 127.0.0.1 금지 → `ip route show default` 의 via(172.17/172.18 등) + :8000
#         # 끝의 /ide/ 필수. http://…:8000/ 만 쓰면 URI 가 잘려 FastAPI 가 {"detail":"Not Found"} 를 낸다.
#         proxy_http_version 1.1;
#         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_set_header X-Forwarded-Proto $scheme;
#         proxy_read_timeout 300s;
#     }
