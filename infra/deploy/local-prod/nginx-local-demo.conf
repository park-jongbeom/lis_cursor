# 로컬 전용 — 단일 URL 로 데모 정적 파일 + /api → uvicorn (HTTP, TLS 없음)
# 기본 listen: 127.0.0.1:9080  |  root / proxy_pass 는 프로젝트 경로·포트에 맞게 수정
#
# 예: RHEL
#   sudo cp infra/deploy/local-prod/nginx-local-demo.conf /etc/nginx/conf.d/idr-local-demo.conf
#   # 파일 안 PROJECT_ROOT, (필요 시) uvicorn 포트를 편집한 뒤:
#   sudo nginx -t && sudo systemctl reload nginx
#
# 브라우저: http://127.0.0.1:9080/  — .env.prod 의 ALLOWED_ORIGINS 에 위 출처 포함

server {
    listen 127.0.0.1:9080;
    server_name 127.0.0.1;

    # ↓↓↓ 프로젝트 루트(리포지토리 최상위) 절대 경로로 바꿀 것
    root /home/사용자/patrick/project/lis_cursor/demo;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8010/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 80M;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8010/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8010/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        proxy_pass http://127.0.0.1:8010/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
